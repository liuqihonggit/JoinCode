          dotnet test components/08-transport/Bridge/tests/Unit/Bridge.Tests.csproj
          -c Release --no-build --nologo
          --filter "Category!=Integration&Category!=Benchmark"
          --logger "console;verbosity=detailed"
          --logger "trx;LogFileName=bridge-tests.trx"
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-results-group-1
          path: '**/*.trx'
          retention-days: 7


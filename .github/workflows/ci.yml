name: CI/CD

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.xxx/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  Configuration: Release

jobs:
  build:
    name: Build
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: 'global.json'

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore JoinCode.slnx

      - name: Build
        run: dotnet build JoinCode.slnx -c Release --no-restore --nologo -m /p:SkipLocalPack=true /p:JccAnalyzers=true /p:EnableNETAnalyzers=true /p:AnalysisLevel=latest

      - name: Build - Component Tests
        run: |
          $projects = @(
            'components/02-brain/Brain/tests/Unit/Brain.Tests.csproj',
            'components/04-guard/Guard/tests/Unit/Guard.Tests.csproj',
            'components/08-transport/Bridge/tests/Unit/Bridge.Tests.csproj',
            'components/03-hands/Hands/tests/Unit/Hands.Tests.csproj',
            'components/01-ai/Mcp/tests/Unit/Mcp.Tests.csproj',
            'components/05-memory/Vault/tests/Unit/Vault.Tests.csproj',
            'components/09-composition/Composition/tests/Unit/Composition.Tests.csproj',
            'components/07-agents/Agents/tests/Unit/Agents.Tests.csproj',
            'components/03-hands/Scheduling/tests/Unit/Scheduling.Tests.csproj',
            'components/03-hands/McpToolHandlers/tests/Unit/McpToolHandlers.Tests.csproj',
            'components/09-composition/Clock/tests/Unit/Clock.Tests.csproj',
            'components/06-perception/Eyes/tests/Unit/Eyes.Tests.csproj',
            'components/06-perception/CodeIndex/tests/Unit/CodeIndex.Tests.csproj',
            'components/01-ai/Dream/tests/Unit/Dream.Tests.csproj',
            'components/06-perception/CodeIndex/tests/E2E/CodeIndex.E2E.Tests.csproj'
          )
          foreach ($p in $projects) {
            Write-Host "Building $p ..."
            dotnet build $p -c Release --nologo -m /p:SkipLocalPack=true /p:JccAnalyzers=true /p:EnableNETAnalyzers=true /p:AnalysisLevel=latest
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
        shell: pwsh

      - name: Upload Build Output
        uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: |
            artifacts/bin/
            !**/runtimes/linux-arm/
            !**/runtimes/linux-arm64/
            !**/runtimes/linux-x64/
            !**/runtimes/linux-x86/
            !**/runtimes/linux-musl-x64/
            !**/runtimes/osx-x64/
            !**/runtimes/osx-arm64/
            !**/runtimes/win-x86/
            !**/runtimes/win-arm64/
            !**/runtimes/unix/
            !**/runtimes/linux/
            !**/runtimes/osx/
          retention-days: 1

  unit-test-group-1:
    name: Unit - Core (Infra/Brain/Guard/Bridge)
    runs-on: windows-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-test-env
      - name: Test - Infra
        run: >
          dotnet test tests/Unit/Infra.Tests/Infra.Tests.csproj
          -c Release --no-build --nologo
          --filter "Category!=Integration&Category!=Benchmark"
          --logger "console;verbosity=detailed"
          --logger "trx;LogFileName=infra-tests.trx"
      - name: Test - Brain
        run: >
          dotnet test components/02-brain/Brain/tests/Unit/Brain.Tests.csproj
          -c Release --no-build --nologo
          --filter "Category!=Integration&Category!=Benchmark"
          --logger "console;verbosity=detailed"
          --logger "trx;LogFileName=brain-tests.trx"
      - name: Test - Guard
        run: >
          dotnet test components/04-guard/Guard/tests/Unit/Guard.Tests.csproj
          -c Release --no-build --nologo
          --filter "Category!=Integration&Category!=Benchmark"
          --logger "console;verbosity=detailed"
          --logger "trx;LogFileName=guard-tests.trx"
      - name: Test - Bridge

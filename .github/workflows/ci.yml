  e2e-mcp-smoke:
    name: E2E - MCP + Sync + CodeIndex + Smoke
    runs-on: windows-latest
    needs: build

    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-test-env
      - name: E2E - MCP Integration
        run: >
          dotnet test tests/MockServers/MockServer.E2E.Tests/MockServer.E2E.Tests.csproj
          -c Release --no-build --nologo
          --filter "FullyQualifiedName~McpIntegrationTests|FullyQualifiedName~McpProtocolE2ETests"
          --logger "console;verbosity=detailed"
          --logger "trx;LogFileName=e2e-mcp.trx"
      - name: E2E - Sync Integration
        run: >
          dotnet test tests/MockServers/Sync.Integration.Tests/Sync.Integration.Tests.csproj
          -c Release --no-build --nologo
          --logger "console;verbosity=detailed"
          --logger "trx;LogFileName=e2e-sync.trx"
      - name: E2E - CodeIndex
        run: >
          dotnet test components/06-perception/CodeIndex/tests/E2E/CodeIndex.E2E.Tests.csproj
          -c Release --no-build --nologo
          --logger "console;verbosity=detailed"
          --logger "trx;LogFileName=e2e-codeindex.trx"
      - name: E2E - Smoke Test (skip MCP)
        if: always()
        shell: pwsh
        run: |
          $config = (Get-Content smoke-test.json -Raw | ConvertFrom-Json).ci
          $awaitSec = $config.awaitSeconds
          $waitMs = $config.waitForExitMs
          Write-Host "Smoke Test config (ci): await=${awaitSec}s, waitForExit=${waitMs}ms - $($config.description)"

          $mockServerExe = Get-ChildItem -Path artifacts/bin/OpenAI.MockServer -Recurse -Filter "JoinCode.OpenAI.MockServer.exe" | Select-Object -First 1
          $jccExe = Get-ChildItem -Path artifacts/bin/JoinCode -Recurse -Filter "jcc.exe" | Where-Object { $_.DirectoryName -notlike "*E2E*" -and $_.DirectoryName -notlike "*Tests*" } | Select-Object -First 1

          if (-not $mockServerExe) { Write-Host "MockServer exe not found" -ForegroundColor Red; exit 1 }
          if (-not $jccExe) { Write-Host "jcc.exe not found" -ForegroundColor Red; exit 1 }

          $mockServerExe = $mockServerExe.FullName
          $jccExe = $jccExe.FullName
          Write-Host "MockServer: $mockServerExe"
          Write-Host "jcc: $jccExe"

          $mockServer = Start-Process -FilePath $mockServerExe -ArgumentList "--port 9901" -PassThru -NoNewWindow

          $ready = $false
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep -Seconds 1
            try {
              Invoke-RestMethod -Uri "http://localhost:9901/" -Method Get -TimeoutSec 2 -ErrorAction SilentlyContinue | Out-Null
              $ready = $true
              Write-Host "MockServer ready (waited $($i+1)s)" -ForegroundColor Green
              break
            } catch {}
          }

          if (-not $ready) {
            Write-Host "MockServer failed to start within 15s" -ForegroundColor Red
            if (-not $mockServer.HasExited) { $mockServer.Kill() }
            exit 1
          }

          try {
            $psi = [System.Diagnostics.ProcessStartInfo]::new()
            $psi.FileName = Resolve-Path $jccExe
            $psi.Arguments = "--trust -p `"hello`" --await $awaitSec"
            $psi.EnvironmentVariables["JCC_ENDPOINT"] = "http://localhost:9901"
            $psi.EnvironmentVariables["JCC_API_KEY"] = "sk-test-ci-key"
            $psi.EnvironmentVariables["JCC_PROVIDER"] = "openai"
            $psi.EnvironmentVariables["JCC_MODEL_ID"] = "gpt-4o"
            $psi.EnvironmentVariables["JCC_SKIP_MCP_INIT"] = "1"
            $psi.EnvironmentVariables["JCC_SKIP_PLUGIN_SKILLS"] = "1"
            $psi.UseShellExecute = $false
            $psi.RedirectStandardOutput = $true
            $psi.RedirectStandardError = $true
            $psi.StandardOutputEncoding = [System.Text.Encoding]::UTF8
            $psi.StandardErrorEncoding = [System.Text.Encoding]::UTF8
            $psi.WorkingDirectory = $env:GITHUB_WORKSPACE

            $jcc = [System.Diagnostics.Process]::Start($psi)
            $stdoutTask = $jcc.StandardOutput.ReadToEndAsync()
            $stderrTask = $jcc.StandardError.ReadToEndAsync()
            $exited = $jcc.WaitForExit($waitMs)

            if (-not $exited) {
              Write-Host "FAIL: jcc.exe timed out ($($waitMs/1000)s)" -ForegroundColor Red
              $jcc.Kill()
              exit 1
            }

            $stdout = $stdoutTask.Result
            $stderr = $stderrTask.Result
            $exitCode = $jcc.ExitCode

            Write-Host "jcc.exe exit code: $exitCode"
            Write-Host "stdout (first 2000 chars): $($stdout.Substring(0, [Math]::Min(2000, $stdout.Length)))"
            if ($stderr) {
              Write-Host "stderr (first 5000 chars): $($stderr.Substring(0, [Math]::Min(5000, $stderr.Length)))"
            }

            if ($exitCode -eq 1234) {
              Write-Host "FAIL: jcc.exe await timer expired (exit 1234)" -ForegroundColor Red
              exit 1
            }
            if ($exitCode -ne 0) {
              Write-Host "FAIL: jcc.exe exited with code $exitCode" -ForegroundColor Red
              exit 1
            }

            Write-Host "PASS: jcc.exe smoke test (skip MCP)" -ForegroundColor Green
          }
          finally {
            try {
              Invoke-RestMethod -Uri "http://localhost:9901/shutdown" -Method Get -TimeoutSec 3 -ErrorAction SilentlyContinue | Out-Null
            } catch {}
            Start-Sleep -Seconds 2
            if (-not $mockServer.HasExited) { $mockServer.Kill() }
          }

      - name: E2E - Smoke Test (full)
        if: always()
        shell: pwsh
        run: |
          $config = (Get-Content smoke-test.json -Raw | ConvertFrom-Json).ci
          $awaitSec = $config.awaitSeconds
          $waitMs = $config.waitForExitMs
          Write-Host "Smoke Test config (ci): await=${awaitSec}s, waitForExit=${waitMs}ms - $($config.description)"

          $mockServerExe = Get-ChildItem -Path artifacts/bin/OpenAI.MockServer -Recurse -Filter "JoinCode.OpenAI.MockServer.exe" | Select-Object -First 1
          $jccExe = Get-ChildItem -Path artifacts/bin/JoinCode -Recurse -Filter "jcc.exe" | Where-Object { $_.DirectoryName -notlike "*E2E*" -and $_.DirectoryName -notlike "*Tests*" } | Select-Object -First 1

          if (-not $mockServerExe) { Write-Host "MockServer exe not found" -ForegroundColor Red; exit 1 }
          if (-not $jccExe) { Write-Host "jcc.exe not found" -ForegroundColor Red; exit 1 }

          $mockServerExe = $mockServerExe.FullName
          $jccExe = $jccExe.FullName
          Write-Host "MockServer: $mockServerExe"
          Write-Host "jcc: $jccExe"

          $mockServer = Start-Process -FilePath $mockServerExe -ArgumentList "--port 9902" -PassThru -NoNewWindow

          $ready = $false
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep -Seconds 1
            try {
              Invoke-RestMethod -Uri "http://localhost:9902/" -Method Get -TimeoutSec 2 -ErrorAction SilentlyContinue | Out-Null
              $ready = $true
              Write-Host "MockServer ready (waited $($i+1)s)" -ForegroundColor Green
              break
            } catch {}
          }

          if (-not $ready) {
            Write-Host "MockServer failed to start within 15s" -ForegroundColor Red
            if (-not $mockServer.HasExited) { $mockServer.Kill() }
            exit 1
          }

          try {
            $psi = [System.Diagnostics.ProcessStartInfo]::new()
            $psi.FileName = Resolve-Path $jccExe
            $psi.Arguments = "--trust -p `"hello`" --await $awaitSec"
            $psi.EnvironmentVariables["JCC_ENDPOINT"] = "http://localhost:9902"
            $psi.EnvironmentVariables["JCC_API_KEY"] = "sk-test-ci-key"
            $psi.EnvironmentVariables["JCC_PROVIDER"] = "openai"
            $psi.EnvironmentVariables["JCC_MODEL_ID"] = "gpt-4o"
            $psi.UseShellExecute = $false
            $psi.RedirectStandardOutput = $true
            $psi.RedirectStandardError = $true
            $psi.StandardOutputEncoding = [System.Text.Encoding]::UTF8
            $psi.StandardErrorEncoding = [System.Text.Encoding]::UTF8
            $psi.WorkingDirectory = $env:GITHUB_WORKSPACE

            $jcc = [System.Diagnostics.Process]::Start($psi)
            $stdoutTask = $jcc.StandardOutput.ReadToEndAsync()
            $stderrTask = $jcc.StandardError.ReadToEndAsync()
            $exited = $jcc.WaitForExit($waitMs)

            if (-not $exited) {
              Write-Host "FAIL: jcc.exe timed out ($($waitMs/1000)s)" -ForegroundColor Red
              $jcc.Kill()
              exit 1
            }

            $stdout = $stdoutTask.Result
            $stderr = $stderrTask.Result
            $exitCode = $jcc.ExitCode

            Write-Host "jcc.exe exit code: $exitCode"
            Write-Host "stdout (first 2000 chars): $($stdout.Substring(0, [Math]::Min(2000, $stdout.Length)))"
            if ($stderr) {
              Write-Host "stderr (first 5000 chars): $($stderr.Substring(0, [Math]::Min(5000, $stderr.Length)))"
              $stderrFile = Join-Path $env:GITHUB_WORKSPACE ".xxx" "jcc_full_stderr.txt"
              if (-not (Test-Path (Split-Path $stderrFile -Parent))) { New-Item -ItemType Directory -Path (Split-Path $stderrFile -Parent) -Force | Out-Null }
              [System.IO.File]::WriteAllText($stderrFile, $stderr)
              Write-Host "Full stderr written to $stderrFile ($($stderr.Length) chars)"
            }

            if ($exitCode -eq 1234) {
              Write-Host "FAIL: jcc.exe await timer expired (exit 1234)" -ForegroundColor Red
              exit 1
            }
            if ($exitCode -ne 0) {
              Write-Host "FAIL: jcc.exe exited with code $exitCode" -ForegroundColor Red
              exit 1
            }

            Write-Host "PASS: jcc.exe smoke test (full)" -ForegroundColor Green
          }
          finally {
            try {
              Invoke-RestMethod -Uri "http://localhost:9902/shutdown" -Method Get -TimeoutSec 3 -ErrorAction SilentlyContinue | Out-Null
            } catch {}
            Start-Sleep -Seconds 2
            if (-not $mockServer.HasExited) { $mockServer.Kill() }
          }

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-results-mcp-smoke
          path: |
            **/e2e-mcp.trx
            **/e2e-sync.trx
            **/e2e-codeindex.trx
            .xxx/jcc_full_stderr.txt
          retention-days: 7

  publish-aot-jcc:
    name: AOT Publish - jcc.exe
    runs-on: windows-latest
    needs: [unit-test-group-1, unit-test-group-2, unit-test-group-3, integration-brain-clock, integration-guard-vault, integration-hands-host-mcp, integration-prefixcache, e2e-conversation, e2e-multi-provider, e2e-file-tools, e2e-agent-tools, e2e-chatcmd, e2e-errors-permission, e2e-mcp-smoke]

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: 'global.json'

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache AOT Native Objects
        uses: actions/cache@v5
        with:
          path: artifacts/obj/
          key: aot-obj-jcc-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            aot-obj-jcc-${{ runner.os }}-

      - name: AOT Publish - jcc.exe
        run: >
          dotnet publish src/JoinCode/JoinCode.csproj
          -c Release
          -r win-x64
          --self-contained true

      - name: Verify jcc.exe
        shell: pwsh
        run: |
          $jccPath = "artifacts/bin/JoinCode/Release/net10.0/win-x64/publish/jcc.exe"
          if (-not (Test-Path $jccPath)) {
            Write-Host "jcc.exe not found at: $jccPath" -ForegroundColor Red
            exit 1
          }
          $size = [math]::Round((Get-Item $jccPath).Length / 1MB, 2)
          Write-Host "jcc.exe: ${size}MB" -ForegroundColor Green

      - name: Upload AOT Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: jcc-aot-win-x64
          path: artifacts/bin/JoinCode/Release/net10.0/win-x64/publish/
          retention-days: 30

  publish-aot-dream:
    name: AOT Compatibility - Dream
    runs-on: windows-latest
    needs: [unit-test-group-1, unit-test-group-2, unit-test-group-3, integration-brain-clock, integration-guard-vault, integration-hands-host-mcp, integration-prefixcache, e2e-conversation, e2e-multi-provider, e2e-file-tools, e2e-agent-tools, e2e-chatcmd, e2e-errors-permission, e2e-mcp-smoke]

    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: 'global.json'

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build Dream (Release, AOT compatibility check)
        run: >
          dotnet build components/01-ai/Dream/src/Dream.csproj
          -c Release
          /p:IsAotCompatible=true

      - name: Verify Dream DLL
        shell: pwsh
        run: |
          $dreamPath = "artifacts/bin/Dream/Release/net10.0/JoinCode.Dream.dll"
          if (-not (Test-Path $dreamPath)) {
            Write-Host "JoinCode.Dream.dll not found at: $dreamPath" -ForegroundColor Red
            exit 1
          }
          $size = [math]::Round((Get-Item $dreamPath).Length / 1KB, 2)
          Write-Host "JoinCode.Dream.dll: ${size}KB" -ForegroundColor Green

  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    needs: [unit-test-group-1, unit-test-group-2, unit-test-group-3, integration-brain-clock, integration-guard-vault, integration-hands-host-mcp, integration-prefixcache, e2e-conversation, e2e-multi-provider, e2e-file-tools, e2e-agent-tools, e2e-chatcmd, e2e-errors-permission, e2e-mcp-smoke, publish-aot-jcc, publish-aot-dream]
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Enabling auto-merge for PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --auto --squash --repo ${{ github.repository }}
